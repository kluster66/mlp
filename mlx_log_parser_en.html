<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLX Training Log Parser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --green: #4effa0;
    --yellow: #ffd166;
    --red: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    margin-bottom: 2.5rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-zone {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s;
  }

  .input-zone:focus-within {
    border-color: var(--accent);
  }

  .input-label {
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 1rem;
    resize: vertical;
    min-height: 180px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #9483ff; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  /* Results */
  #results { display: none; }

  .section-title {
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }

  .stat-label {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.red { color: var(--red); }

  /* Chart */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  canvas {
    width: 100% !important;
    max-height: 260px;
  }

  .chart-legend {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* Table */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
  }

  thead {
    background: var(--surface2);
  }

  th {
    padding: 0.75rem 1.2rem;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.65rem 1.2rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }

  tr.best-row td {
    background: rgba(124, 107, 255, 0.08);
  }

  tr.best-row td:first-child {
    border-left: 3px solid var(--accent);
  }

  .badge {
    display: inline-block;
    font-size: 0.6rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 0.5rem;
  }

  .badge-best {
    background: rgba(124, 107, 255, 0.2);
    color: var(--accent);
  }

  .badge-overfit-start {
    background: rgba(255, 209, 102, 0.2);
    color: var(--yellow);
  }

  .badge-overfit-max {
    background: rgba(255, 107, 107, 0.15);
    color: var(--red);
  }

  /* Markdown output */
  .markdown-out {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    white-space: pre;
    overflow-x: auto;
    color: var(--text);
    line-height: 1.7;
  }

  .copy-btn {
    margin-top: 0.75rem;
  }

  /* Verdict */
  .verdict {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .verdict-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .verdict-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
  }

  .verdict-text strong {
    color: var(--accent);
  }

  .error-msg {
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: var(--red);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    margin-top: 1rem;
    display: none;
  }

  .separator {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
</style>
</head>
<body>

<header>
  <h1>MLX Log Parser</h1>
  <p class="subtitle">// paste your training log → table + automatic analysis</p>
</header>

<div class="input-zone">
  <span class="input-label">▸ MLX Training Log</span>
  <textarea id="logInput" placeholder="Paste your mlx_lm.lora training log here...

Example:
Iter 1: Val loss 2.742, Val took 1.153s
Iter 10: Train loss 2.068, Learning Rate 1.000e-05, It/sec 1.809, ...
Iter 100: Val loss 0.759, Val took 0.325s
..."></textarea>
  <div class="btn-row">
    <button class="btn-primary" onclick="parseLogs()">Analyze</button>
    <button class="btn-secondary" onclick="loadExample()">Load example</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div id="results">

  <div class="btn-row" style="justify-content:flex-end;margin-bottom:1.5rem">
    <button class="btn-secondary" onclick="exportReport()">↓ Export report</button>
  </div>

  <p class="section-title">▸ Statistics</p>
  <div class="stats-grid" id="statsGrid"></div>

  <p class="section-title">▸ Loss curve</p>
  <div class="chart-container">
    <canvas id="lossChart"></canvas>
    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#7c6bff"></div>
        Train loss
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ff6b9d"></div>
        Val loss
      </div>
      <div class="legend-item" id="overfitStartLegend" style="display:none">
        <div class="legend-dot" style="background:var(--yellow)"></div>
        Overfit start
      </div>
      <div class="legend-item" id="overfitMaxLegend" style="display:none">
        <div class="legend-dot" style="background:#ff6b6b"></div>
        1% threshold
      </div>
    </div>
  </div>

  <p class="section-title">▸ Verdict</p>
  <div class="verdict" id="verdictBox">
    <div class="verdict-icon" id="verdictIcon"></div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <p class="section-title">▸ Measurements</p>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Iteration</th>
          <th>Train loss</th>
          <th>Val loss</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <p class="section-title">▸ Markdown export (for Obsidian)</p>
  <div class="markdown-out" id="markdownOut"></div>
  <button class="btn-primary copy-btn" onclick="copyMarkdown(event)">Copy Markdown</button>

</div>

<script>
// ─── Parser ───────────────────────────────────────────
function parseLogs() {
  const raw = document.getElementById('logInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!raw) {
    showError('Paste a log before running the analysis.');
    return;
  }

  const lines = raw.split('\n');
  const trainPoints = [];
  const valPoints   = [];

  for (const line of lines) {
    // Train loss
    const trainMatch = line.match(/Iter\s+(\d+):\s+Train loss\s+([\d.]+)/);
    if (trainMatch) {
      trainPoints.push({ iter: parseInt(trainMatch[1]), loss: parseFloat(trainMatch[2]) });
    }
    // Val loss
    const valMatch = line.match(/Iter\s+(\d+):\s+Val loss\s+([\d.]+)/);
    if (valMatch) {
      valPoints.push({ iter: parseInt(valMatch[1]), loss: parseFloat(valMatch[2]) });
    }
  }

  if (trainPoints.length === 0 && valPoints.length === 0) {
    showError('No data found. Make sure your log contains "Iter X: Train loss" or "Iter X: Val loss" lines.');
    return;
  }

  renderResults(trainPoints, valPoints);
}

function renderResults(trainPoints, valPoints) {
  document.getElementById('results').style.display = 'block';

  // Best val
  let bestVal = null;
  if (valPoints.length > 0) {
    bestVal = valPoints.reduce((a, b) => a.loss < b.loss ? a : b);
  }

  // overfitStart: first point after the minimum where val loss ticks up (even slightly)
  let overfitStart = null;
  if (bestVal) {
    const bestIdx = valPoints.findIndex(p => p.iter === bestVal.iter);
    for (let i = bestIdx + 1; i < valPoints.length; i++) {
      if (valPoints[i].loss > bestVal.loss) {
        overfitStart = valPoints[i];
        break;
      }
    }
  }

  // overfitMax: first consecutive jump >1% starting from overfitStart
  let overfitMax = null;
  if (overfitStart) {
    const startIdx = valPoints.findIndex(p => p.iter === overfitStart.iter);
    const prev = valPoints[startIdx - 1];
    if (prev && overfitStart.loss > prev.loss * 1.01) {
      overfitMax = overfitStart;
    } else {
      for (let i = startIdx + 1; i < valPoints.length; i++) {
        if (valPoints[i].loss > valPoints[i - 1].loss * 1.01) {
          overfitMax = valPoints[i];
          break;
        }
      }
    }
  }

  // Stats
  const lastTrain = trainPoints.length > 0 ? trainPoints[trainPoints.length - 1] : null;
  const firstVal  = valPoints.length > 0 ? valPoints[0] : null;
  renderStats(firstVal, lastTrain, bestVal, overfitStart, trainPoints.length);

  // Chart
  renderChart(trainPoints, valPoints, bestVal, overfitStart, overfitMax);

  // Verdict
  renderVerdict(bestVal, overfitStart, overfitMax, trainPoints, valPoints);

  // Table
  renderTable(trainPoints, valPoints, bestVal, overfitStart, overfitMax);

  // Markdown
  renderMarkdown(trainPoints, valPoints, bestVal, overfitStart);

  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderStats(firstVal, lastTrain, bestVal, overfitStart, totalIters) {
  const grid = document.getElementById('statsGrid');
  const stats = [
    {
      label: 'Initial val loss',
      value: firstVal ? firstVal.loss.toFixed(3) : '—',
      cls: 'red'
    },
    {
      label: 'Best val loss',
      value: bestVal ? bestVal.loss.toFixed(3) : '—',
      cls: 'green'
    },
    {
      label: 'Best checkpoint',
      value: bestVal ? `iter ${bestVal.iter}` : '—',
      cls: 'accent'
    },
    {
      label: 'Final train loss',
      value: lastTrain ? lastTrain.loss.toFixed(3) : '—',
      cls: 'yellow'
    },
    {
      label: 'Overfit starts',
      value: overfitStart ? `iter ${overfitStart.iter}` : 'No',
      cls: overfitStart ? 'red' : 'green'
    },
    {
      label: 'Total iterations',
      value: lastTrain ? lastTrain.iter : totalIters,
      cls: 'accent'
    },
  ];

  grid.innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.cls}">${s.value}</div>
    </div>
  `).join('');
}

function renderChart(trainPoints, valPoints, bestVal, overfitStart, overfitMax) {
  const canvas = document.getElementById('lossChart');
  const ctx = canvas.getContext('2d');

  // Dimensions
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 48;
  const H = 220;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const allLoss = [...trainPoints.map(p => p.loss), ...valPoints.map(p => p.loss)];
  const allIter = [...trainPoints.map(p => p.iter), ...valPoints.map(p => p.iter)];
  const minIter = Math.min(...allIter);
  const maxIter = Math.max(...allIter);
  const minLoss = 0;
  const maxLoss = Math.max(...allLoss) * 1.05;

  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const toX = iter => pad.left + ((iter - minIter) / (maxIter - minIter || 1)) * cW;
  const toY = loss => pad.top + (1 - (loss - minLoss) / (maxLoss - minLoss || 1)) * cH;

  // Grid
  ctx.strokeStyle = '#1c1c28';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * cH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + cW, y);
    ctx.stroke();
    const val = maxLoss - (i / 4) * maxLoss;
    ctx.fillStyle = '#6b6b8a';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(2), pad.left - 6, y + 4);
  }

  // X axis labels — pick up to 6 evenly spaced labels from actual iteration values
  ctx.textAlign = 'center';
  ctx.fillStyle = '#6b6b8a';
  ctx.font = '10px JetBrains Mono';
  const sortedIters = [...new Set([...trainPoints, ...valPoints].map(p => p.iter))].sort((a, b) => a - b);
  const labelStep = Math.max(1, Math.floor(sortedIters.length / 6));
  sortedIters.forEach((iter, idx) => {
    if (idx % labelStep === 0 || idx === sortedIters.length - 1) {
      ctx.fillText(iter, toX(iter), H - pad.bottom + 18);
    }
  });

  // Best val line
  if (bestVal) {
    const bx = toX(bestVal.iter);
    ctx.strokeStyle = 'rgba(124,107,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(bx, pad.top);
    ctx.lineTo(bx, pad.top + cH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(124,107,255,0.7)';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`best (${bestVal.iter})`, bx, pad.top - 5);
  }

  // Draw line helper
  function drawLine(points, color) {
    if (points.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach((p, i) => {
      const x = toX(p.iter);
      const y = toY(p.loss);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // Dots for val points (only when sparse)
    if (points.length < 20) {
      points.forEach(p => {
        ctx.beginPath();
        ctx.arc(toX(p.iter), toY(p.loss), 3.5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      });
    }
  }

  drawLine(trainPoints, '#7c6bff');
  drawLine(valPoints, '#ff6b9d');

  document.getElementById('overfitStartLegend').style.display = overfitStart ? 'flex' : 'none';
  document.getElementById('overfitMaxLegend').style.display  = (overfitMax && overfitMax !== overfitStart) ? 'flex' : 'none';

  // Marker: overfit start (yellow) — first point that rises after the minimum
  if (overfitStart) {
    const ox = toX(overfitStart.iter);
    const oy = toY(overfitStart.loss);
    ctx.beginPath();
    ctx.arc(ox, oy, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd166';
    ctx.fill();
    ctx.fillStyle = 'rgba(255,209,102,0.85)';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`↑ overfit (${overfitStart.iter})`, ox, oy - 10);
  }

  // Marker: 1% threshold (red) — first consecutive jump >1%
  if (overfitMax && overfitMax !== overfitStart) {
    const ox = toX(overfitMax.iter);
    const oy = toY(overfitMax.loss);
    ctx.strokeStyle = 'rgba(255,107,107,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(ox, pad.top);
    ctx.lineTo(ox, pad.top + cH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(ox, oy, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ff6b6b';
    ctx.fill();
    ctx.fillStyle = 'rgba(255,107,107,0.85)';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`⚠ threshold (${overfitMax.iter})`, ox, oy - 10);
  }
}

function renderVerdict(bestVal, overfitStart, overfitMax, trainPoints, valPoints) {
  const icon = document.getElementById('verdictIcon');
  const text = document.getElementById('verdictText');

  if (!bestVal) {
    icon.textContent = 'ℹ️';
    text.innerHTML = 'Not enough validation data to analyse overfitting.';
    return;
  }

  const n = valPoints.length;
  const lastTrain = trainPoints[trainPoints.length - 1];
  const lastVal   = valPoints[valPoints.length - 1];

  // Reliability based on number of validation points
  const [confidence, confColor] =
    n >= 7 ? ['high',      'var(--green)']   :
    n >= 4 ? ['medium',    'var(--yellow)']  :
    n >= 2 ? ['low',       'var(--accent2)'] :
             ['very low',  'var(--red)'];

  const confNote = `<span style="font-size:.78rem;color:var(--muted)">Detection reliability: <span style="color:${confColor}">${confidence}</span> (${n} validation point${n > 1 ? 's' : ''})</span>`;

  if (overfitStart) {
    const gap        = lastVal.loss - bestVal.loss;
    const relGap     = gap / bestVal.loss;
    const lastIter   = lastTrain ? lastTrain.iter : lastVal.iter;
    const overfitDuration = lastIter - overfitStart.iter;
    const overfitPct = lastIter > 0 ? (overfitDuration / lastIter * 100).toFixed(0) : '?';
    const genGap     = lastTrain ? bestVal.loss - lastTrain.loss : null;
    const startGap   = overfitStart.loss - bestVal.loss;

    const recs = [];
    recs.push(`Use checkpoint <strong>iter ${bestVal.iter}</strong> (val loss: ${bestVal.loss.toFixed(3)})`);
    if (genGap !== null && genGap > 0.5) {
      recs.push(`High train/val gap (<strong>${genGap.toFixed(3)}</strong>) — dataset is probably too small or too repetitive`);
    }
    recs.push('For the next run: reduce <strong>--learning-rate</strong>, <strong>--num-layers</strong>, or increase the dataset');

    const maxLine = overfitMax && overfitMax !== overfitStart
      ? `→ 1% threshold crossed at iter <strong>${overfitMax.iter}</strong> (val loss: ${overfitMax.loss.toFixed(3)})<br>`
      : '';

    icon.textContent = '⚠️';
    text.innerHTML = `Overfitting starts at iter <strong>${overfitStart.iter}</strong> (+${startGap.toFixed(3)} from the minimum).<br>
    ${maxLine}<br>
    → Min val loss: <strong>${bestVal.loss.toFixed(3)}</strong> (iter ${bestVal.iter})<br>
    → Final val loss: <strong>${lastVal.loss.toFixed(3)}</strong> (+${gap.toFixed(3)}, +${(relGap * 100).toFixed(1)}%)<br>
    → In overfit for the last <strong>${overfitDuration} iterations</strong> (${overfitPct}% of total)<br>
    ${genGap !== null ? `→ Train/val generalisation gap: <strong>${genGap.toFixed(3)}</strong><br>` : ''}
    <br><strong>Recommendations:</strong><br>
    ${recs.map(r => `→ ${r}`).join('<br>')}
    <br><br>${confNote}`;

  } else {
    // Val loss trend over the last 2 points
    const valTrend  = n >= 2 ? lastVal.loss - valPoints[n - 2].loss : null;
    // Train loss trend over the last 20% of points
    const tLen      = trainPoints.length;
    const trainTrend = tLen >= 4
      ? trainPoints[tLen - 1].loss - trainPoints[Math.floor(tLen * 0.8)].loss
      : null;

    const recs = [];
    if (valTrend !== null && valTrend < -0.01) {
      recs.push('Val loss is still decreasing — train with <strong>more iterations</strong>');
    } else if (valTrend !== null && Math.abs(valTrend) <= 0.01) {
      recs.push('Val loss is plateauing — the model is approaching its limit on this dataset');
      recs.push('Consider increasing the dataset or adjusting <strong>--num-layers</strong>');
    } else {
      recs.push('Consider <strong>more iterations</strong> to continue improving the model');
    }
    if (trainTrend !== null && Math.abs(trainTrend) < 0.005) {
      recs.push('Train loss has converged — continuing will likely not improve val loss further');
    }

    icon.textContent = '✅';
    text.innerHTML = `No overfitting detected. Val loss is stable or decreasing.<br><br>
    <strong>Recommendations:</strong><br>
    ${recs.map(r => `→ ${r}`).join('<br>')}
    <br><br>${confNote}`;
  }
}

function buildIterRows(trainPoints, valPoints) {
  const iters = new Map();
  trainPoints.forEach(p => {
    if (!iters.has(p.iter)) iters.set(p.iter, {});
    iters.get(p.iter).train = p.loss;
  });
  valPoints.forEach(p => {
    if (!iters.has(p.iter)) iters.set(p.iter, {});
    iters.get(p.iter).val = p.loss;
  });

  const valIters = new Set(valPoints.map(p => p.iter));
  const showIters = new Set();
  for (const iter of iters.keys()) {
    if (valIters.has(iter)) showIters.add(iter);
  }
  if (trainPoints.length > 0) {
    showIters.add(trainPoints[0].iter);
    showIters.add(trainPoints[trainPoints.length - 1].iter);
  }

  const sorted = [...showIters].sort((a, b) => a - b);
  return { iters, sorted };
}

function renderTable(trainPoints, valPoints, bestVal, overfitStart, overfitMax) {
  const tbody = document.getElementById('tableBody');
  const { iters, sorted } = buildIterRows(trainPoints, valPoints);

  tbody.innerHTML = sorted.map(iter => {
    const row = iters.get(iter) || {};
    const isBest         = bestVal      && iter === bestVal.iter       && row.val !== undefined;
    const isOverfitStart = overfitStart && iter === overfitStart.iter  && row.val !== undefined;
    const isOverfitMax   = overfitMax   && iter === overfitMax.iter    && row.val !== undefined && overfitMax !== overfitStart;

    let badge = '';
    if (isBest)         badge += `<span class="badge badge-best">best</span>`;
    if (isOverfitStart) badge += `<span class="badge badge-overfit-start">↑ overfit</span>`;
    if (isOverfitMax)   badge += `<span class="badge badge-overfit-max">⚠ 1% threshold</span>`;

    const status = isBest         ? '← recommended checkpoint'
                 : isOverfitMax   ? '⚠ 1% threshold crossed'
                 : isOverfitStart ? '↑ val loss rising'
                 : '';

    return `<tr class="${isBest ? 'best-row' : ''}">
      <td>${iter}${badge}</td>
      <td>${row.train !== undefined ? row.train.toFixed(3) : '—'}</td>
      <td>${row.val !== undefined ? row.val.toFixed(3) : '—'}</td>
      <td style="color:var(--muted);font-size:0.75rem">${status}</td>
    </tr>`;
  }).join('');
}

function renderMarkdown(trainPoints, valPoints, bestVal, overfitStart) {
  const { iters, sorted } = buildIterRows(trainPoints, valPoints);

  let md = '| Iteration | Train loss | Val loss |\n';
  md    += '|---|---|---|\n';

  sorted.forEach(iter => {
    const row = iters.get(iter) || {};
    const isBest         = bestVal      && iter === bestVal.iter      && row.val !== undefined;
    const isOverfitStart = overfitStart && iter === overfitStart.iter && row.val !== undefined;
    const suffix = isBest ? ' ← best checkpoint' : isOverfitStart ? ' ← overfit start' : '';
    md += `| ${iter} | ${row.train !== undefined ? row.train.toFixed(3) : '—'} | ${row.val !== undefined ? row.val.toFixed(3) + suffix : '—'} |\n`;
  });

  document.getElementById('markdownOut').textContent = md;
}
